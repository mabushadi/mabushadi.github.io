<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#111111">Same result  ·  10× less cost  ·  6× faster</text>

  <!-- BEFORE column -->
  <text x="210" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#A32D2D">The expensive way</text>

  <!-- Bar - tall, mostly red waste -->
  <rect x="100" y="90" width="220" height="240" rx="6" fill="#F09595" stroke="#E24B4A" stroke-width="1.5"/>
  <!-- waste label -->
  <text x="210" y="150" text-anchor="middle" font-size="13" fill="#791F1F">wasted</text>
  <text x="210" y="170" text-anchor="middle" font-size="13" fill="#791F1F">re-reading</text>
  <text x="210" y="190" text-anchor="middle" font-size="13" fill="#791F1F">old history</text>
  <text x="210" y="218" text-anchor="middle" font-size="20" font-weight="700" fill="#A32D2D">93%</text>

  <!-- useful sliver at bottom -->
  <rect x="100" y="312" width="220" height="18" rx="0" fill="#97C459"/>
  <text x="210" y="323" text-anchor="middle" font-size="10" font-weight="700" fill="#173404">useful 7%</text>

  <text x="210" y="356" text-anchor="middle" font-size="24" font-weight="700" fill="#A32D2D">~$50</text>
  <text x="210" y="378" text-anchor="middle" font-size="13" fill="#888888">~2 hours  ·  inconsistent</text>

  <!-- VS -->
  <text x="450" y="240" text-anchor="middle" font-size="28" font-weight="700" fill="#888888">vs</text>

  <!-- AFTER column -->
  <text x="700" y="74" text-anchor="middle" font-size="15" font-weight="700" fill="#3B6D11">The efficient way</text>

  <!-- Empty space above - shows what was saved -->
  <rect x="580" y="90" width="240" height="218" rx="6" fill="#EAF3DE" stroke="#C0DD97" stroke-width="1.5"/>
  <text x="700" y="180" text-anchor="middle" font-size="13" fill="#639922">nothing</text>
  <text x="700" y="200" text-anchor="middle" font-size="13" fill="#639922">wasted</text>
  <text x="700" y="220" text-anchor="middle" font-size="13" fill="#639922">here</text>

  <!-- Short green useful bar -->
  <rect x="580" y="308" width="240" height="22" rx="0" fill="#97C459" stroke="#639922" stroke-width="1"/>
  <text x="700" y="324" text-anchor="middle" font-size="11" font-weight="700" fill="#173404">~100% useful work</text>

  <text x="700" y="356" text-anchor="middle" font-size="24" font-weight="700" fill="#3B6D11">~$4</text>
  <text x="700" y="378" text-anchor="middle" font-size="13" fill="#888888">~20 minutes  ·  consistent</text>

  <!-- Baseline -->
  <line x1="80" y1="330" x2="840" y2="330" stroke="#dddddd" stroke-width="1"/>

  <!-- Savings pill -->
  <rect x="296" y="398" width="308" height="34" rx="17" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="450" y="421" text-anchor="middle" font-size="14" font-weight="700" fill="#04342C">save ~$46 every time you do this</text>
</svg>

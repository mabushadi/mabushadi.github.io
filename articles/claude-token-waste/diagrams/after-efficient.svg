<svg width="900" height="440" viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#111111">The efficient way: one fresh conversation per skill</text>

  <!-- Session boxes - 5 across -->
  <rect x="30" y="72" width="140" height="96" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="100" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#04342C">Session 1</text>
  <text x="100" y="122" text-anchor="middle" font-size="12" fill="#0F6E56">Skill 1 only</text>
  <text x="100" y="142" text-anchor="middle" font-size="12" fill="#0F6E56">~2,500 tokens</text>

  <rect x="192" y="72" width="140" height="96" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="262" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#04342C">Session 2</text>
  <text x="262" y="122" text-anchor="middle" font-size="12" fill="#0F6E56">Skill 2 only</text>
  <text x="262" y="142" text-anchor="middle" font-size="12" fill="#0F6E56">~2,500 tokens</text>

  <rect x="354" y="72" width="140" height="96" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="424" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#04342C">Session 3</text>
  <text x="424" y="122" text-anchor="middle" font-size="12" fill="#0F6E56">Skill 3 only</text>
  <text x="424" y="142" text-anchor="middle" font-size="12" fill="#0F6E56">~2,500 tokens</text>

  <rect x="516" y="72" width="140" height="96" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="586" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#04342C">Session 4</text>
  <text x="586" y="122" text-anchor="middle" font-size="12" fill="#0F6E56">Skill 4 only</text>
  <text x="586" y="142" text-anchor="middle" font-size="12" fill="#0F6E56">~2,500 tokens</text>

  <rect x="678" y="72" width="192" height="96" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="774" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#04342C">Sessions 5 – 10</text>
  <text x="774" y="116" text-anchor="middle" font-size="12" fill="#0F6E56">same small size</text>
  <text x="774" y="136" text-anchor="middle" font-size="12" fill="#0F6E56">every single time</text>

  <!-- Flat line -->
  <line x1="30" y1="194" x2="870" y2="194" stroke="#1D9E75" stroke-width="2.5"/>
  <text x="450" y="216" text-anchor="middle" font-size="13" fill="#0F6E56">context stays flat — no history from any other skill ever enters a session</text>

  <!-- Three rules -->
  <rect x="30" y="238" width="250" height="80" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="155" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#173404">Rule 1</text>
  <text x="155" y="284" text-anchor="middle" font-size="12" fill="#3B6D11">New conversation</text>
  <text x="155" y="302" text-anchor="middle" font-size="12" fill="#3B6D11">for every skill</text>

  <rect x="325" y="238" width="250" height="80" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="450" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#173404">Rule 2</text>
  <text x="450" y="284" text-anchor="middle" font-size="12" fill="#3B6D11">Dense opening prompt</text>
  <text x="450" y="302" text-anchor="middle" font-size="12" fill="#3B6D11">zero clarification rounds</text>

  <rect x="620" y="238" width="250" height="80" rx="12" fill="#EAF3DE" stroke="#639922" stroke-width="1"/>
  <text x="745" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#173404">Rule 3</text>
  <text x="745" y="284" text-anchor="middle" font-size="12" fill="#3B6D11">Run eval only when</text>
  <text x="745" y="302" text-anchor="middle" font-size="12" fill="#3B6D11">logic actually changed</text>

  <!-- Result bar -->
  <rect x="160" y="344" width="580" height="64" rx="14" fill="#E1F5EE" stroke="#1D9E75" stroke-width="2"/>
  <text x="450" y="370" text-anchor="middle" font-size="17" font-weight="700" fill="#04342C">~43,000 tokens total  ·  ~$4  ·  same output quality</text>
  <text x="450" y="393" text-anchor="middle" font-size="13" fill="#0F6E56">90% cheaper than the one-conversation approach</text>
</svg>

<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#111111">How cross-file consistency works without cross-file memory</text>

  <!-- Scan: 10 files in, one Haiku call -->
  <!-- File stack -->
  <rect x="30" y="72" width="110" height="38" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="85" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#2C2C2A">10 skill files</text>

  <rect x="30" y="118" width="110" height="30" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1" opacity="0.7"/>
  <rect x="30" y="155" width="110" height="30" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="1" opacity="0.4"/>
  <text x="85" y="175" text-anchor="middle" font-size="10" fill="#888780">all 10 loaded once</text>

  <line x1="140" y1="112" x2="176" y2="112" stroke="#BA7517" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Haiku scan box -->
  <rect x="176" y="80" width="170" height="64" rx="12" fill="#FAEEDA" stroke="#EF9F27" stroke-width="1.5"/>
  <text x="261" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#412402">One Haiku scan</text>
  <text x="261" y="126" text-anchor="middle" font-size="12" fill="#633806">"find same ideas"</text>
  <text x="261" y="158" text-anchor="middle" font-size="11" fill="#888888">~$0.08  ·  done once only</text>

  <line x1="346" y1="112" x2="382" y2="112" stroke="#534AB7" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Shared rulebook -->
  <rect x="382" y="62" width="360" height="210" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="2"/>
  <text x="562" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#26215C">Shared Rulebook  (written once)</text>

  <rect x="398" y="104" width="328" height="46" rx="8" fill="#ffffff" stroke="#7F77DD" stroke-width="1"/>
  <text x="562" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#26215C">"Read skill file first"  →</text>
  <text x="562" y="142" text-anchor="middle" font-size="12" fill="#3C3489">Call view SKILL.md as first action.</text>

  <rect x="398" y="158" width="328" height="46" rx="8" fill="#ffffff" stroke="#7F77DD" stroke-width="1"/>
  <text x="562" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#26215C">"Copy to outputs folder"  →</text>
  <text x="562" y="196" text-anchor="middle" font-size="12" fill="#3C3489">Copy to /mnt/user-data/outputs/</text>

  <text x="562" y="252" text-anchor="middle" font-size="12" fill="#534AB7">+ 6 more canonical definitions</text>

  <!-- Arrow down to sessions -->
  <line x1="562" y1="272" x2="562" y2="310" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="562" y="298" text-anchor="middle" font-size="11" fill="#888888">pasted into every session</text>

  <!-- Session boxes getting the rulebook -->
  <rect x="200" y="316" width="178" height="80" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="289" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#04342C">Session (Skill 1)</text>
  <text x="289" y="358" text-anchor="middle" font-size="11" fill="#0F6E56">rulebook + skill 1 edits</text>
  <text x="289" y="376" text-anchor="middle" font-size="11" fill="#0F6E56">+ skill 1 file only</text>

  <rect x="522" y="316" width="178" height="80" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="611" y="340" text-anchor="middle" font-size="13" font-weight="700" fill="#04342C">Session (Skill 2)</text>
  <text x="611" y="358" text-anchor="middle" font-size="11" fill="#0F6E56">rulebook + skill 2 edits</text>
  <text x="611" y="376" text-anchor="middle" font-size="11" fill="#0F6E56">+ skill 2 file only</text>

  <!-- Key insight -->
  <rect x="60" y="420" width="780" height="44" rx="22" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="450" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="#04342C">Consistency is guaranteed by the shared rulebook — not by the AI remembering across sessions</text>
  <text x="450" y="458" text-anchor="middle" font-size="12" fill="#0F6E56">Each session reads the same definitions · Each session edits only its own file · No cross-file memory needed</text>
</svg>

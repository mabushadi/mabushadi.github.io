<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif;">

  <!-- Title -->
  <text x="450" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#111111">The expensive way: one giant conversation</text>

  <!-- Skill 1 box -->
  <rect x="40" y="80" width="120" height="70" rx="12" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <text x="100" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#501313">Skill 1</text>
  <text x="100" y="130" text-anchor="middle" font-size="12" fill="#791F1F">read + edit</text>
  <text x="100" y="168" text-anchor="middle" font-size="11" fill="#888888">~2k tokens</text>

  <line x1="160" y1="115" x2="186" y2="115" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Skill 2 box - taller to show growth -->
  <rect x="186" y="68" width="144" height="82" rx="12" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <text x="258" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#501313">Skill 2</text>
  <text x="258" y="115" text-anchor="middle" font-size="12" fill="#791F1F">+ history of S1</text>
  <text x="258" y="133" text-anchor="middle" font-size="12" fill="#791F1F">read + edit</text>
  <text x="258" y="168" text-anchor="middle" font-size="11" fill="#888888">~8k tokens</text>

  <line x1="330" y1="109" x2="358" y2="109" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Skill 3 box - even taller -->
  <rect x="358" y="54" width="160" height="96" rx="12" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <text x="438" y="80" text-anchor="middle" font-size="15" font-weight="700" fill="#501313">Skill 3</text>
  <text x="438" y="99" text-anchor="middle" font-size="12" fill="#791F1F">+ history S1, S2</text>
  <text x="438" y="117" text-anchor="middle" font-size="12" fill="#791F1F">read + edit</text>
  <text x="438" y="135" text-anchor="middle" font-size="12" fill="#791F1F">+ eval loop</text>
  <text x="438" y="168" text-anchor="middle" font-size="11" fill="#888888">~18k tokens</text>

  <line x1="518" y1="102" x2="546" y2="102" stroke="#E24B4A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Skills 4-10 box - massive -->
  <rect x="546" y="36" width="314" height="114" rx="12" fill="#FCEBEB" stroke="#E24B4A" stroke-width="2"/>
  <text x="703" y="62" text-anchor="middle" font-size="15" font-weight="700" fill="#501313">Skills 4 – 10</text>
  <text x="703" y="82" text-anchor="middle" font-size="12" fill="#791F1F">+ ALL prior history</text>
  <text x="703" y="100" text-anchor="middle" font-size="12" fill="#791F1F">ballooning every turn</text>
  <text x="703" y="118" text-anchor="middle" font-size="12" fill="#791F1F">paying for old work</text>
  <text x="703" y="168" text-anchor="middle" font-size="11" fill="#888888">~60,000+ tokens per turn</text>

  <!-- Growing arrow -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#E24B4A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <line x1="40" y1="198" x2="855" y2="198" stroke="#E24B4A" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="450" y="218" text-anchor="middle" font-size="13" fill="#666666">context window keeps growing → you pay for ALL of it, every single turn</text>

  <!-- Divider -->
  <line x1="40" y1="238" x2="860" y2="238" stroke="#eeeeee" stroke-width="1"/>

  <!-- Waste block -->
  <rect x="60" y="256" width="300" height="150" rx="14" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.5"/>
  <text x="210" y="290" text-anchor="middle" font-size="20" font-weight="700" fill="#A32D2D">~450,000 tokens</text>
  <text x="210" y="314" text-anchor="middle" font-size="13" fill="#791F1F">total context sent to AI</text>
  <text x="210" y="338" text-anchor="middle" font-size="18" font-weight="700" fill="#A32D2D">~$50 cost</text>
  <text x="210" y="362" text-anchor="middle" font-size="13" fill="#791F1F">~2 hours · inconsistent output</text>

  <!-- Useful block -->
  <rect x="440" y="256" width="420" height="150" rx="14" fill="#EAF3DE" stroke="#639922" stroke-width="1.5"/>
  <text x="650" y="290" text-anchor="middle" font-size="16" font-weight="700" fill="#173404">Only ~30,000 tokens</text>
  <text x="650" y="312" text-anchor="middle" font-size="13" fill="#3B6D11">were actually doing useful work</text>
  <rect x="460" y="328" width="380" height="28" rx="6" fill="#97C459"/>
  <text x="650" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#173404">7% useful work   |   93% re-reading old history</text>

  <text x="450" y="444" text-anchor="middle" font-size="14" font-weight="700" fill="#A32D2D">You paid $50 to have the AI remember conversations it didn't need to remember.</text>

  <!-- Bottom callout -->
  <rect x="160" y="462" width="580" height="40" rx="20" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>
  <text x="450" y="488" text-anchor="middle" font-size="13" fill="#791F1F">93% waste  ·  $46 burned  ·  same result achievable for $4</text>
</svg>
